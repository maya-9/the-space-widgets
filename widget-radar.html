<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Life Balance</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{--bg:#FDF5EC;--sub:#34685C}
@media(prefers-color-scheme:dark){:root{--bg:#1E404F;--sub:#5DCAA5}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);padding:14px}
.title{font-size:11px;font-weight:500;color:var(--sub);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.chart-wrap{height:160px;position:relative}
.legend{display:flex;flex-wrap:wrap;gap:6px 12px;margin-top:8px}
.leg-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--sub)}
.leg-dot{width:7px;height:7px;border-radius:50%}
.updated{font-size:10px;color:var(--sub);opacity:0.5;margin-top:8px;text-align:right}
</style></head><body>
<div class="title">🌐 Life balance</div>
<div class="chart-wrap"><canvas id="radar"></canvas></div>
<div class="legend">
  <div class="leg-item"><div class="leg-dot" style="background:#CC2132"></div>Academics</div>
  <div class="leg-item"><div class="leg-dot" style="background:#34685C"></div>Orgs</div>
  <div class="leg-item"><div class="leg-dot" style="background:#988A20"></div>Fitness</div>
  <div class="leg-item"><div class="leg-dot" style="background:#E6692A"></div>Chores</div>
  <div class="leg-item"><div class="leg-dot" style="background:#E9BD96"></div>Wellness</div>
</div>
<div class="updated">Updated May 23, 11:08 AM</div>
<script>
const dark=window.matchMedia('(prefers-color-scheme:dark)').matches;
const gridC=dark?'rgba(233,189,150,0.08)':'rgba(30,64,79,0.08)';
const labelC=dark?'#E9BD96':'#34685C';
const fillC=dark?'rgba(93,202,165,0.15)':'rgba(52,104,92,0.15)';
const borderC=dark?'#5DCAA5':'#34685C';
new Chart(document.getElementById('radar'),{
  type:'radar',
  data:{
    labels:['Academics','Orgs','Fitness','Chores','Wellness'],
    datasets:[{
      data:[40,70,0,10,90],
      backgroundColor:fillC,borderColor:borderC,borderWidth:1.5,
      pointBackgroundColor:['#CC2132','#34685C','#988A20','#E6692A','#E9BD96'],
      pointRadius:4,pointHoverRadius:6
    }]
  },
  options:{
    responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false}},
    scales:{r:{
      beginAtZero:true,max:100,
      ticks:{display:false},
      grid:{color:gridC},
      angleLines:{color:gridC},
      pointLabels:{font:{size:10},color:labelC}
    }}
  }
});
</script></body></html>
