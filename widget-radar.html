<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Balance</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #FDF5EC; padding: 14px; }
  .title { font-size: 11px; font-weight: 500; color: #34685C; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .chart-wrap { height: 160px; position: relative; }
  .legend { display: flex; flex-wrap: wrap; gap: 6px 12px; margin-top: 8px; }
  .leg-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: #34685C; }
  .leg-dot { width: 7px; height: 7px; border-radius: 50%; }
</style>
</head>
<body>
  <div class="title">🌐 Life balance</div>
  <div class="chart-wrap"><canvas id="radar"></canvas></div>
  <div class="legend">
    <div class="leg-item"><div class="leg-dot" style="background:#CC2132"></div>Academics</div>
    <div class="leg-item"><div class="leg-dot" style="background:#34685C"></div>Orgs</div>
    <div class="leg-item"><div class="leg-dot" style="background:#988A20"></div>Fitness</div>
    <div class="leg-item"><div class="leg-dot" style="background:#E6692A"></div>Chores</div>
    <div class="leg-item"><div class="leg-dot" style="background:#E9BD96"></div>Wellness</div>
  </div>
  <script>
    new Chart(document.getElementById('radar'), {
      type: 'radar',
      data: {
        labels: ['Academics', 'Orgs', 'Fitness', 'Chores', 'Wellness'],
        datasets: [{
          data: [70, 60, 55, 30, 65],
          backgroundColor: 'rgba(52,104,92,0.15)',
          borderColor: '#34685C',
          borderWidth: 1.5,
          pointBackgroundColor: ['#CC2132','#34685C','#988A20','#E6692A','#E9BD96'],
          pointRadius: 4,
          pointHoverRadius: 6,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          r: {
            beginAtZero: true, max: 100,
            ticks: { display: false, stepSize: 25 },
            grid: { color: 'rgba(30,64,79,0.08)' },
            angleLines: { color: 'rgba(30,64,79,0.08)' },
            pointLabels: { font: { size: 10 }, color: '#34685C' }
          }
        }
      }
    });
  </script>
</body>
</html>
