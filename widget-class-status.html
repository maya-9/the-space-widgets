<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Class Status</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #FDF5EC;
    padding: 14px;
    font-size: 13px;
  }
  .class-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 0.5px solid rgba(30,64,79,0.1);
  }
  .class-row:last-child { border-bottom: none; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .name { font-weight: 500; color: #1E404F; width: 72px; font-size: 12px; }
  .due { flex: 1; color: #34685C; font-size: 11px; }
  .bar-wrap { width: 70px; height: 4px; background: rgba(30,64,79,0.1); border-radius: 2px; overflow: hidden; flex-shrink: 0; }
  .bar-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }
  .badge {
    font-size: 10px; padding: 2px 7px; border-radius: 10px;
    font-weight: 500; flex-shrink: 0;
  }
</style>
</head>
<body>
  <div id="classes"></div>
  <script>
    const classes = [
      { name: "Eng 301",  due: "Essay draft · Due today", pct: 40,  color: "#CC2132", badge: "Urgent",      badgeBg: "rgba(204,33,50,0.12)",   badgeC: "#CC2132" },
      { name: "Math 240", due: "Problem set 4 · Due Mon",  pct: 65,  color: "#E6692A", badge: "In progress", badgeBg: "rgba(230,105,42,0.12)",  badgeC: "#E6692A" },
      { name: "Hist 210", due: "Ch. 4–6 reading · Due Wed",pct: 20,  color: "#34685C", badge: "Started",     badgeBg: "rgba(52,104,92,0.12)",   badgeC: "#34685C" },
      { name: "Sci 110",  due: "Lab report 2 · Due Thu",   pct: 55,  color: "#988A20", badge: "On track",    badgeBg: "rgba(152,138,32,0.12)",  badgeC: "#988A20" },
    ];
    const container = document.getElementById("classes");
    classes.forEach(c => {
      container.innerHTML += `
        <div class="class-row">
          <div class="dot" style="background:${c.color}"></div>
          <div class="name">${c.name}</div>
          <div class="due">${c.due}</div>
          <div class="bar-wrap"><div class="bar-fill" style="width:${c.pct}%;background:${c.color}"></div></div>
          <div class="badge" style="background:${c.badgeBg};color:${c.badgeC}">${c.badge}</div>
        </div>`;
    });
  </script>
</body>
</html>
