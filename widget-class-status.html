<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Class Status</title>
<style>
:root{--bg:#FDF5EC;--text:#1E404F;--sub:#34685C;--border:rgba(30,64,79,0.1);--empty:rgba(30,64,79,0.07)}
@media(prefers-color-scheme:dark){:root{--bg:#1E404F;--text:#E9BD96;--sub:#34685C;--border:rgba(233,189,150,0.12);--empty:rgba(233,189,150,0.06)}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);padding:14px;font-size:13px}
.class-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--border)}
.class-row:last-child{border-bottom:none}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.name{font-weight:500;color:var(--text);width:72px;font-size:12px}
.due{flex:1;color:var(--sub);font-size:11px}
.bar-wrap{width:70px;height:4px;background:var(--empty);border-radius:2px;overflow:hidden;flex-shrink:0}
.bar-fill{height:100%;border-radius:2px}
.badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500;flex-shrink:0}
.updated{font-size:10px;color:var(--sub);opacity:0.5;margin-top:10px;text-align:right}
</style></head><body>

      <div class="class-row">
        <div class="dot" style="background:#CC2132"></div>
        <div class="name">General</div>
        <div class="due">Lab Report 2 · Due 2026-05-23</div>
        <div class="bar-wrap"><div class="bar-fill" style="width:55%;background:#E6692A"></div></div>
        <div class="badge" style="background:rgba(52,104,92,0.12);color:#E6692A">In progress</div>
      </div>
<div class="updated">Updated May 23, 01:48 PM</div>
</body></html>
