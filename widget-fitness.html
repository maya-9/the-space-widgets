<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Fitness</title>
<style>
:root{--bg:#FDF5EC;--text:#1E404F;--sub:#34685C;--border:rgba(30,64,79,0.1);--empty:rgba(30,64,79,0.07);--done-bg:rgba(152,138,32,0.15);--done-c:#988A20}
@media(prefers-color-scheme:dark){:root{--bg:#1E404F;--text:#E9BD96;--sub:#34685C;--border:rgba(233,189,150,0.12);--empty:rgba(233,189,150,0.06);--done-bg:rgba(152,138,32,0.25);--done-c:#ED9530}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);padding:14px;font-size:13px}
.day-labels{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.day-lbl{text-align:center;font-size:10px;color:var(--sub)}
.day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.day-block{aspect-ratio:1;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:12px}
.done{background:var(--done-bg);color:var(--done-c)}
.empty{background:var(--empty)}
.summary{margin-top:10px;font-size:11px;color:var(--sub);display:flex;justify-content:space-between}
.summary b{color:var(--text)}
.log-section{margin-top:10px;border-top:0.5px solid var(--border);padding-top:8px}
.log-row{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:11px;color:var(--text)}
.log-dot{width:6px;height:6px;border-radius:50%;background:#988A20;flex-shrink:0}
.log-meta{margin-left:auto;color:var(--sub)}
.updated{font-size:10px;color:var(--sub);opacity:0.5;margin-top:8px;text-align:right}
</style></head><body>
<div class="day-labels"><div class="day-lbl">M</div><div class="day-lbl">T</div><div class="day-lbl">W</div><div class="day-lbl">T</div><div class="day-lbl">F</div><div class="day-lbl">S</div><div class="day-lbl">S</div></div>
<div class="day-grid"><div class="day-block empty"></div><div class="day-block empty"></div><div class="day-block empty"></div><div class="day-block empty"></div><div class="day-block empty"></div><div class="day-block empty"></div><div class="day-block empty"></div></div>
<div class="summary"><span><b>0</b> of <b>3</b> workouts this week</span><span style="color:#988A20;font-weight:500">0%</span></div>
<div class="log-section"></div>
<div class="updated">Updated May 23, 10:53 AM</div>
</body></html>
