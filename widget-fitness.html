<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fitness Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #FDF5EC; padding: 14px; font-size: 13px; }
  .day-labels { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; margin-bottom: 4px; }
  .day-lbl { text-align: center; font-size: 10px; color: #34685C; }
  .day-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
  .day-block {
    aspect-ratio: 1; border-radius: 4px; display: flex;
    align-items: center; justify-content: center; font-size: 13px;
  }
  .done { background: rgba(152,138,32,0.15); }
  .empty { background: rgba(30,64,79,0.07); }
  .check { color: #988A20; font-size: 14px; }
  .summary { margin-top: 10px; font-size: 11px; color: #34685C; display: flex; justify-content: space-between; align-items: center; }
  .summary b { color: #1E404F; }
  .log-section { margin-top: 10px; border-top: 0.5px solid rgba(30,64,79,0.1); padding-top: 8px; }
  .log-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 11px; color: #1E404F; }
  .log-dot { width: 6px; height: 6px; border-radius: 50%; background: #988A20; flex-shrink: 0; }
  .log-meta { margin-left: auto; color: #34685C; }
</style>
</head>
<body>
  <div class="day-labels">
    <div class="day-lbl">M</div><div class="day-lbl">T</div><div class="day-lbl">W</div>
    <div class="day-lbl">T</div><div class="day-lbl">F</div><div class="day-lbl">S</div><div class="day-lbl">S</div>
  </div>
  <div class="day-grid">
    <div class="day-block done"><span class="check">✓</span></div>
    <div class="day-block empty"></div>
    <div class="day-block done"><span class="check">✓</span></div>
    <div class="day-block empty"></div>
    <div class="day-block empty"></div>
    <div class="day-block empty"></div>
    <div class="day-block empty"></div>
  </div>
  <div class="summary"><span><b>2</b> of <b>3</b> workouts this week</span><span style="color:#988A20;font-weight:500">67%</span></div>
  <div class="log-section">
    <div class="log-row"><div class="log-dot"></div>Morning run<div class="log-meta">30 min · Mon</div></div>
    <div class="log-row"><div class="log-dot"></div>Chest day<div class="log-meta">45 min · Wed</div></div>
  </div>
</body>
</html>
