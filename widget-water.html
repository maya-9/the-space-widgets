<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Water Intake</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #FDF5EC; padding: 14px; }
  .title { font-size: 11px; font-weight: 500; color: #34685C; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .drops { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .drop {
    width: 32px; height: 38px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; border-radius: 4px;
    transition: opacity 0.2s, transform 0.15s;
  }
  .drop.on { opacity: 1; }
  .drop.off { opacity: 0.2; filter: grayscale(0.5); }
  .drop:hover { transform: scale(1.15); }
  .summary { font-size: 12px; color: #1E404F; }
  .summary b { color: #34685C; }
  .bar-wrap { height: 5px; background: rgba(30,64,79,0.1); border-radius: 3px; margin-top: 8px; overflow: hidden; }
  .bar-fill { height: 100%; background: #34685C; border-radius: 3px; transition: width 0.4s ease; }
  .tap-hint { font-size: 10px; color: rgba(52,104,92,0.5); margin-top: 6px; }
</style>
</head>
<body>
  <div class="title">💧 Water intake</div>
  <div class="drops" id="drops"></div>
  <div class="bar-wrap"><div class="bar-fill" id="bar"></div></div>
  <div class="summary" id="summary"></div>
  <div class="tap-hint">tap a drop to log</div>
  <script>
    const GOAL = 8;
    let count = parseInt(localStorage.getItem('water') || '5');
    const dropsEl = document.getElementById('drops');
    const barEl = document.getElementById('bar');
    const summaryEl = document.getElementById('summary');

    function render() {
      dropsEl.innerHTML = '';
      for (let i = 0; i < GOAL; i++) {
        const d = document.createElement('div');
        d.className = 'drop ' + (i < count ? 'on' : 'off');
        d.textContent = '💧';
        d.onclick = () => { count = (i < count) ? i : i + 1; localStorage.setItem('water', count); render(); };
        dropsEl.appendChild(d);
      }
      barEl.style.width = Math.round((count / GOAL) * 100) + '%';
      summaryEl.innerHTML = `<b>${count}</b> of <b>${GOAL}</b> cups today`;
    }
    render();
  </script>
</body>
</html>
