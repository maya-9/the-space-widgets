<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upcoming</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #FDF5EC; padding: 14px; font-size: 13px; }
  .title { font-size: 11px; font-weight: 500; color: #34685C; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .event-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 0.5px solid rgba(30,64,79,0.1); }
  .event-row:last-child { border-bottom: none; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .event-text { flex: 1; color: #1E404F; font-size: 12px; }
  .event-cat { font-size: 10px; color: #34685C; }
  .day-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: rgba(52,104,92,0.1); color: #34685C; flex-shrink: 0; }
  .day-badge.today { background: rgba(204,33,50,0.1); color: #CC2132; font-weight: 500; }
</style>
</head>
<body>
  <div class="title">📅 Upcoming</div>
  <div id="events"></div>
  <script>
    const events = [
      { text: "Essay — Eng 301",       cat: "Academic", day: "Today", color: "#CC2132", today: true  },
      { text: "Math 240 problem set",  cat: "Academic", day: "Mon",   color: "#E6692A", today: false },
      { text: "Org staff meeting",     cat: "Org",      day: "Tue",   color: "#34685C", today: false },
      { text: "Hist 210 reading",      cat: "Academic", day: "Wed",   color: "#988A20", today: false },
      { text: "Sci 110 lab report",    cat: "Academic", day: "Thu",   color: "#988A20", today: false },
      { text: "Laundry",               cat: "Chores",   day: "Sat",   color: "#E9BD96", today: false },
    ];
    const el = document.getElementById('events');
    events.forEach(e => {
      el.innerHTML += `
        <div class="event-row">
          <div class="dot" style="background:${e.color}"></div>
          <div>
            <div class="event-text">${e.text}</div>
            <div class="event-cat">${e.cat}</div>
          </div>
          <div class="day-badge ${e.today ? 'today' : ''}">${e.day}</div>
        </div>`;
    });
  </script>
</body>
</html>
